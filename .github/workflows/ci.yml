name: CI

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v5

      - name: Install Lua development tools
        run: |
          eval "$(luarocks path --lua-version=5.1 --bin)"
          make deps

      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check readeck.koplugin/main.lua readeck.koplugin/_meta.lua readeck.koplugin/readeck spec

      - name: Lint and test
        run: |
          eval "$(luarocks path --lua-version=5.1 --bin)"
          make lint
          make test

  koreader-runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install KOReader build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            autoconf \
            automake \
            build-essential \
            ca-certificates \
            ccache \
            cmake \
            curl \
            gcc-multilib \
            gettext \
            git \
            libegl-dev \
            libtool \
            libtool-bin \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            meson \
            nasm \
            ninja-build \
            patch \
            pkg-config \
            unzip \
            wget

      - name: Clone KOReader
        run: |
          mkdir -p references
          git clone --depth 1 https://github.com/koreader/koreader.git references/koreader

      - name: Cache KOReader downloads
        uses: actions/cache@v4
        with:
          path: references/koreader/base/thirdparty/*/build/downloads
          key: koreader-downloads-${{ runner.os }}-${{ hashFiles('references/koreader/base/thirdparty/**/*.mk') }}
          restore-keys: koreader-downloads-${{ runner.os }}-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: koreader-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: koreader-ccache-${{ runner.os }}-

      - name: Fetch KOReader third-party sources
        run: ./kodev fetch-thirdparty
        working-directory: references/koreader

      - name: Build KOReader emulator runtime
        run: ./kodev build emulator
        working-directory: references/koreader

      - name: KOReader runtime smoke test
        run: make koreader-runtime-smoke
